<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #FFFBF7; color: #0C0A09; -webkit-font-smoothing: antialiased; }
  ::selection { background: rgba(234,88,12,0.15); }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f5f5f5; } ::-webkit-scrollbar-thumb { background: #d4c5b8; border-radius: 3px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  @keyframes scaleIn { from { opacity:0; transform:scale(0.94); } to { opacity:1; transform:scale(1); } }
  @keyframes barGrow { from { width: 0; } to { width: var(--w); } }
  @keyframes countUp { from { opacity:0; } to { opacity:1; } }
  @keyframes floatGlow { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.03); } }
  @keyframes pulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
  @keyframes gradShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

  .nav-link { position: relative; }
  .nav-link::after { content:''; position:absolute; bottom:-2px; left:0; width:0; height:1.5px; background:#EA580C; transition:width 0.25s ease; }

  .hero-card { animation: scaleIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.4s both; }
  .fade-up-1 { animation: fadeUp 0.6s ease 0.1s both; }
  .fade-up-2 { animation: fadeUp 0.6s ease 0.25s both; }
  .fade-up-3 { animation: fadeUp 0.6s ease 0.4s both; }
  .fade-up-4 { animation: fadeUp 0.6s ease 0.55s both; }

  .card-hover { transition: transform 0.25s ease, box-shadow 0.25s ease; }

  .btn-primary { background: #EA580C; color: #fff; transition: background 0.2s, transform 0.15s, box-shadow 0.2s; }

function clamp(min, max) { return `clamp(${min}px, 3vw, ${max}px)`; }

// ─── SCROLL REVEAL ────────────────────────────

function useMediaQuery(query) {
  const [matches, setMatches] = useState(() => window.matchMedia(query).matches);
  useEffect(() => {
    const mql = window.matchMedia(query);
    const fn = () => setMatches(mql.matches);
    mql.addEventListener("change", fn);
    return () => mql.removeEventListener("change", fn);
  }, [query]);
  return matches;
}

function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { el.classList.add("visible"); obs.disconnect(); } }, { threshold: 0.12 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

const Reveal = ({ children, delay=0, style={{} }}) => {
  const ref = useReveal();
  return <div ref={ref} className="section-reveal" style={{ transitionDelay:`${delay}ms`, ...style }}>{children}</div>;
};

const GaugeArc = ({ score, size=160 }) => {
  const r = (size - 16) / 2;
  const circ = 2 * Math.PI * r;
  const pct = score / 100;
  const color = score < 35 ? "#DC2626" : score < 65 ? C.orange : C.green;
  const label = score < 35 ? "Low" : score < 65 ? "Medium" : "High";
  return (
    <div style={{position:"relative", width:size, height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-225deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={9} strokeDasharray={`${circ*0.75} ${circ*0.25}`} strokeLinecap="round"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={9} strokeDasharray={`${circ*pct*0.75} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 1.2s cubic-bezier(0.4,0,0.2,1)"}}/>
      </svg>
      <div style={{position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:2}}>
        <span style={{fontFamily:font, fontSize:34, fontWeight:800, color, lineHeight:1}}>{score}</span>

  );
};

        {[{v:"$13.3k",l:"This Week"},{v:"★ 4.9",l:"Rating"},{v:"91",l:"GEO Score"}].map((s,i) => (
          <div key={i} style={{flex:1, padding:"10px 0", textAlign:"center", borderRight:i<2?`1px solid ${C.border}`:"none"}}>
            <div style={{fontSize:13, fontWeight:800, color:i===2?C.orange:C.text}}>{s.v}</div>
            <div style={{fontSize:10, color:C.faint, fontWeight:600, marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>
      {/* Leads */}
      {leads.map((l,i) => (
        <div key={i} style={{
          marginBottom:i<leads.length-1?10:0,
          padding:"12px 14px", borderRadius:12,
          background: l.hot ? `${C.green}08` : C.cream,
          border:`1px solid ${l.hot ? `${C.green}20` : C.border}`,
          display:"flex", gap:10, alignItems:"flex-start",
        }}>
          <div style={{width:32, height:32, borderRadius:"50%", background:l.hot?`${C.green}20`:C.creamDark, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0}}>
            <span style={{fontSize:12, fontWeight:800, color:l.hot?C.green:C.muted}}>{l.avatar}</span>
          </div>
          <div style={{flex:1, minWidth:0}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:3}}>
              <span style={{fontSize:12.5, fontWeight:700, color:C.text}}>{l.name}</span>
              <span style={{fontSize:10, color:C.faint}}>{l.time}</span>
            </div>
            <div style={{fontSize:11.5, color:C.muted, lineHeight:1.4, marginBottom:4, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>{l.msg}</div>
            <div style={{fontSize:11, fontWeight:700, color:l.hot?C.green:C.muted}}>{l.budget}</div>
          </div>
        </div>
      ))}
      {/* CTA */}
      <div style={{marginTop:14, padding:"10px 14px", background:`${C.green}10`, borderRadius:10, display:"flex", alignItems:"center", gap:8}}>
        <Icon name="trending" size={13} color={C.green}/>
        <span style={{fontSize:12, color:C.green, fontWeight:600}}>+34% more leads than last month</span>
      </div>
      {/* Floating badge */}
      <div style={{
        position:"absolute", top:-14, right:-14,
        background:C.dark, color:"#fff",
        padding:"6px 12px", borderRadius:20,
        fontSize:11, fontWeight:700, display:"flex", alignItems:"center", gap:5,
        boxShadow:"0 4px 16px rgba(0,0,0,0.2)",
      }}>
        <span style={{width:6, height:6, borderRadius:"50%", background:"#4ade80", display:"inline-block"}}/>
        Live Leads
      </div>
    </div>
  );
};

// ─── HERO WIDGET TOGGLE ───────────────────────
const HeroWidgetToggle = () => {
  const [tab, setTab] = useState("geo");
  return (
    <div style={{display:"flex", flexDirection:"column", alignItems:"center", gap:18}}>
      {/* Pill toggle */}
      <div style={{
        display:"flex", background:C.white, borderRadius:50, padding:4,
        border:`1px solid ${C.border}`,
        boxShadow:"0 2px 8px rgba(0,0,0,0.05)",
      }}>
        {[
          { key:"geo", label:"Increase AI Visibility", color:C.orange },
          { key:"marketplace", label:"Get Direct Leads", color:C.green },
        ].map(t => (
          <button key={t.key} onClick={() => setTab(t.key)} style={{
            padding:"8px 18px", borderRadius:50, border:"none", cursor:"pointer",
            fontFamily:font, fontWeight:700, fontSize:12.5,
            background: tab===t.key ? t.color : "transparent",
            color: tab===t.key ? "#fff" : C.muted,
            transition:"all 0.25s ease",
          }}>{t.label}</button>
        ))}
      </div>
      {/* Widget with crossfade */}
      <div className="hero-widget-wrap">
        <div style={{
          position:"absolute", inset:0,
          opacity: tab==="geo" ? 1 : 0,
          transform: tab==="geo" ? "translateY(0) scale(1)" : "translateY(8px) scale(0.97)",
          transition:"opacity 0.35s ease, transform 0.35s ease",
          pointerEvents: tab==="geo" ? "auto" : "none",
        }}>
          <HeroWidget/>
        </div>
        <div style={{
          position:"absolute", inset:0,
          opacity: tab==="marketplace" ? 1 : 0,
          transform: tab==="marketplace" ? "translateY(0) scale(1)" : "translateY(8px) scale(0.97)",
          transition:"opacity 0.35s ease, transform 0.35s ease",
          pointerEvents: tab==="marketplace" ? "auto" : "none",
        }}>
          <MarketplaceHeroWidget/>
        </div>
      </div>
    </div>
  );
};

// ─── TWEAKS ───────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#EA580C",
  "heroScore": 67,
  "showTestimonials": true,
  "pricingHighlight": "Pro"
}/*EDITMODE-END*/;

// ─── APP ──────────────────────────────────────
const App = () => {
  const [active, setActiveRaw] = useState(() => localStorage.getItem("fyndroo_page") || "home");
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);

  const setActive = (page) => {
    setActiveRaw(page);
    localStorage.setItem("fyndroo_page", page);
    window.scrollTo({ top:0, behavior:"smooth" });
  };

  // Tweaks integration
  useEffect(() => {
    window.addEventListener("message", (e) => {
      if (e.data?.type === "__activate_edit_mode") setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    });
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
  }, []);

  const pages = { home: HomePage, geo: GeoPage, marketplace: MarketplacePage, agencies: AgenciesPage, pricing: PricingPage };
  const PageComponent = pages[active] || HomePage;

  return (
    <div style={{minHeight:"100vh", display:"flex", flexDirection:"column"}}>
      <Nav active={active} setActive={setActive}/>
      <main style={{flex:1, paddingTop:66, width:"100%", overflowX:"hidden"}}>
        <PageComponent setActive={setActive}/>
      </main>
      <Footer setActive={setActive}/>

      {/* Tweaks Panel */}
      {showTweaks && (
        <div style={{
          position:"fixed", bottom:24, right:24, zIndex:9999,
          background:C.white, borderRadius:16, padding:24, width:260,
          boxShadow:"0 20px 60px rgba(0,0,0,0.15)", border:`1px solid ${C.border}`,
        }}>
          <div style={{fontWeight:700, fontSize:14, color:C.text, marginBottom:16, display:"flex", justifyContent:"space-between"}}>
            Tweaks
            <button onClick={() => setShowTweaks(false)} style={{background:"none", border:"none", cursor:"pointer", color:C.muted}}>✕</button>
          </div>
          <div style={{display:"flex", flexDirection:"column", gap:14}}>
            <div>
              <label style={{fontSize:11, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:0.8, display:"block", marginBottom:6}}>Accent Color</label>
              <input type="color" value={tweaks.accentColor} onChange={e => {
                const v = e.target.value;
                setTweaks(t => ({...t, accentColor:v}));
                window.parent.postMessage({type:"__edit_mode_set_keys", edits:{accentColor:v}}, "*");
              }} style={{width:"100%", height:36, borderRadius:8, border:`1px solid ${C.border}`, cursor:"pointer"}}/>
            </div>
            <div>
              <label style={{fontSize:11, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:0.8, display:"block", marginBottom:6}}>Hero GEO Score: {tweaks.heroScore}</label>
              <input type="range" min={0} max={100} value={tweaks.heroScore} onChange={e => {
                const v = parseInt(e.target.value);
                setTweaks(t => ({...t, heroScore:v}));
                window.parent.postMessage({type:"__edit_mode_set_keys", edits:{heroScore:v}}, "*");
              }} style={{width:"100%"}}/>
            </div>
            <div>
              <label style={{fontSize:11, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:0.8, display:"block", marginBottom:8}}>Navigate To</label>
              <div style={{display:"flex", flexDirection:"column", gap:6}}>
                {["home","geo","marketplace","agencies","pricing"].map(p => (
                  <button key={p} onClick={() => setActive(p)} style={{
                    padding:"7px 12px", borderRadius:8, fontFamily:font, fontSize:13,
                    fontWeight:active===p ? 700 : 500,
                    background: active===p ? C.orange : C.creamDark,
                    color: active===p ? "#fff" : C.muted,
                    border:"none", cursor:"pointer", textAlign:"left", textTransform:"capitalize",
                  }}>{p}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
